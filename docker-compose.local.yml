services:
  db:
    image: postgres:14-alpine
    container_name: ${PROJECT}_db
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
    restart: always
    networks:
      - local
  common:
    image: ${PROJECT}_base
    container_name: ${PROJECT}_common
    build:
      context: ./
      dockerfile: Dockerfile.local
      args:
        CA_CERTIFICATE_PATH: './cert/zscaler-root-ca.pem'
    command: 'yarn watch:common'
    volumes:
      - ./packages:/app/packages
  api:
    image: ${PROJECT}_base
    container_name: ${PROJECT}_api
    build:
      context: ./
      dockerfile: Dockerfile.local
      args:
        CA_CERTIFICATE_PATH: './cert/zscaler-root-ca.pem'
    command: 'yarn watch:api'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    ports:
      - '4000:4000'
    env_file: ./.env
    environment:
      - POSTGRES_HOST=db
      - BUILD_ID=${COMMIT_SHA}
      - BUILD_INFO=${LAST_COMMIT_MESSAGE}
    depends_on:
      - db
      - common
    networks:
      - local

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: ${PROJECT}_keycloak
    command: start-dev --import-realm
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    volumes:
      - ./keycloak/realm-ien.json:/opt/keycloak/data/import/realm-ien.json
    ports:
      - '8080:8080'
    networks:
      - local

  web:
    image: ${PROJECT}_base
    container_name: ${PROJECT}_web
    build:
      context: ./
      dockerfile: Dockerfile.local
      args:
        CA_CERTIFICATE_PATH: './cert/zscaler-root-ca.pem'
    command: 'yarn watch:web'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
      - RUNTIME_ENV=local
      - NEXT_PUBLIC_AUTH_REALM=${NEXT_PUBLIC_AUTH_REALM}
      - NEXT_PUBLIC_AUTH_URL=${NEXT_PUBLIC_AUTH_URL}
    depends_on:
      - api
networks:
  local:
    driver: bridge
